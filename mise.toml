[tools]
node = "latest"

[tasks.dev]
run = "npm run watch"
description = "Watch and rebuild on changes"

[tasks.build]
run = "npm run build"
description = "Build the extension"

[tasks.install]
run = "npm run install-ext"
description = "Build, package, and install the extension in VSCode"

[tasks.typecheck]
run = "npm run typecheck"
description = "Type-check without emitting"

[tasks.publish]
run = "open https://marketplace.visualstudio.com/manage/publishers/kud"
description = "Open the VS Code Marketplace publisher page to upload the .vsix"

[tasks.release]
run = """
#!/usr/bin/env zsh
bump=${1:-patch}
npm version $bump --no-git-tag-version
version=$(node -p "require('./package.json').version")
git add package.json
git commit -m "🔖 chore(release): bump to $version"
git tag "v$version"
git push && git push --tags
echo "Released v$version — building .vsix and opening marketplace…"
npm run build && npm run package
open https://marketplace.visualstudio.com/manage/publishers/kud
"""
description = "Bump version, tag, push, build .vsix, and open marketplace to upload"
