name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Package
        run: mkdir -p build && npm run package
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "build/*.vsix"
          generate_release_notes: true
          body: |
            ## Install

            ```sh
            code --install-extension revu-vscode-${{ github.ref_name }}.vsix
            ```

            Or download the `.vsix` above and drag it into VS Code Extensions panel.

            ---

            **Marketplace:** upload the `.vsix` manually at https://marketplace.visualstudio.com/manage/publishers/kud
